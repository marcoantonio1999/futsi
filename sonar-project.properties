sonar.projectKey=futsi-mini-erp
sonar.projectName=Futsi Mini ERP
sonar.projectVersion=0.4.0
sonar.organization=marcoantonio1999

sonar.sources=back,front/src
sonar.tests=back/core/tests,qa/selenium
sonar.sourceEncoding=UTF-8

sonar.python.version=3.12
sonar.python.coverage.reportPaths=reports/backend-coverage.xml
sonar.python.xunit.reportPath=reports/backend-pytest.xml

sonar.javascript.lcov.reportPaths=front/coverage/lcov.info

sonar.exclusions=**/__pycache__/**,**/.venv/**,**/venv/**,**/node_modules/**,**/dist/**,front/android/**,media/**,back/staticfiles/**,qa/artifacts/**,docs/**/*.pdf,docs/**/*.docx
sonar.test.exclusions=front/android/**
sonar.coverage.exclusions=front/src/**/*.d.ts,back/**/migrations/**,back/manage.py,qa/**
