name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-pytest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: futsi_test
          POSTGRES_USER: futsi
          POSTGRES_PASSWORD: futsi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U futsi -d futsi_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: back
    env:
      DB_ENGINE: postgres
      DJANGO_DEBUG: "true"
      FUTSI_ENV: test
      DJANGO_TEST_FAST_PASSWORD_HASHERS: "true"
      POSTGRES_DB: futsi_test
      POSTGRES_USER: futsi
      POSTGRES_PASSWORD: futsi
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      POSTGRES_SSLMODE: disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            back/requirements.txt
            back/requirements-test.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt -r requirements-test.txt
      - run: mkdir -p ../reports
      - run: python -m pytest core/tests --cov=core --cov-report=xml:../reports/backend-coverage.xml --junitxml=../reports/backend-pytest.xml --cov-fail-under=60
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-reports
          path: |
            reports/backend-pytest.xml
            reports/backend-coverage.xml

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: front/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://127.0.0.1:8000/api' }}
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}

  selenium-e2e:
    runs-on: ubuntu-latest
    needs: [backend-pytest, frontend-build]
    env:
      DB_ENGINE: sqlite
      ALLOW_SQLITE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            back/requirements.txt
            back/requirements-test.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: front/package-lock.json
      - uses: browser-actions/setup-chrome@v1
      - run: python -m pip install --upgrade pip
      - run: pip install -r back/requirements.txt -r back/requirements-test.txt
      - run: npm ci
        working-directory: front
      - run: mkdir -p qa/artifacts
      - run: python -m pytest qa/selenium -m e2e --junitxml=qa/artifacts/selenium.xml
        env:
          FUTSI_E2E_API_PORT: "8100"
          FUTSI_E2E_WEB_PORT: "5176"
          FUTSI_E2E_HEADLESS: "1"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-artifacts
          path: qa/artifacts/**

  sonarqube:
    runs-on: ubuntu-latest
    needs: [backend-pytest, frontend-build]
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: futsi_test
          POSTGRES_USER: futsi
          POSTGRES_PASSWORD: futsi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U futsi -d futsi_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_ENGINE: postgres
      DJANGO_DEBUG: "true"
      FUTSI_ENV: test
      DJANGO_TEST_FAST_PASSWORD_HASHERS: "true"
      POSTGRES_DB: futsi_test
      POSTGRES_USER: futsi
      POSTGRES_PASSWORD: futsi
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      POSTGRES_SSLMODE: disable
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            back/requirements.txt
            back/requirements-test.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r back/requirements.txt -r back/requirements-test.txt
      - run: mkdir -p reports
      - run: python -m pytest back/core/tests --cov=core --cov-config=back/.coveragerc --cov-report=xml:reports/backend-coverage.xml --junitxml=reports/backend-pytest.xml --cov-fail-under=60
      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
      - name: Skip SonarQube scan when secret is missing
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN is not configured; skipping SonarQube scan."
