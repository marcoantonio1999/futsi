[pytest]
DJANGO_SETTINGS_MODULE = futsi_api.settings
pythonpath =
    back
python_files = test_*.py
testpaths =
    back/core/tests
markers =
    api: backend API and model tests
    security: abusive input and authorization tests
    e2e: Selenium browser end-to-end tests
    slow: slow or environment-heavy tests
addopts = --strict-markers --reuse-db
